name: Fetch AI Tools

# Runs the discovery pipeline on a schedule and on demand.
on:
  schedule:
    # Every 3 hours (UTC). GitHub Actions cron is free for public repos.
    - cron: '0 */3 * * *'
  workflow_dispatch:

# Allow the workflow to push commits back to the repo.
permissions:
  contents: write

# Don't pile up runs if a previous one is still going.
concurrency:
  group: fetch-tools
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run discovery pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        run: node scripts/fetch-tools.mjs

      - name: Commit & publish discovered tools
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tools.json data/pending.json data/last-run.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          elif git diff --cached --name-only | grep -q '^data/tools.json$'; then
            # New tools were auto-published — let Vercel rebuild & deploy the live site.
            git commit -m "feat(data): auto-publish newly discovered AI tools"
            git push
            echo "Published new tools — Vercel will redeploy."
          else
            # Only pipeline state changed (last-run / pending) — skip the rebuild.
            git commit -m "chore(data): update pipeline state [skip ci]"
            git push
            echo "State-only update — no redeploy."
          fi
