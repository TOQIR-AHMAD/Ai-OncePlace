name: Notify Pending Tools

# Optional: opens/updates a GitHub Issue listing tools awaiting review so you
# get a notification. Runs after the fetch workflow finishes, or on demand.
on:
  workflow_run:
    workflows: ['Fetch AI Tools']
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Open or update pending-tools issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let pending = [];
            try {
              pending = JSON.parse(fs.readFileSync('data/pending.json', 'utf8'));
            } catch (e) {
              core.info('No pending.json found or invalid JSON.');
            }

            if (!Array.isArray(pending) || pending.length === 0) {
              core.info('No pending tools — nothing to notify.');
              return;
            }

            const label = 'pending-tools';

            const lines = pending.map((t) => {
              const conf = t._meta && typeof t._meta.confidence === 'number'
                ? ` _(confidence ${t._meta.confidence.toFixed(2)})_`
                : '';
              const cats = (t.categories || []).join(', ') || '—';
              return `- [ ] **${t.name}** — ${t.url}\n  - ${t.description || '(no description)'}\n  - pricing: \`${t.pricing}\` · categories: ${cats}${conf}`;
            });

            const body = [
              `🤖 **${pending.length} AI tool(s) awaiting review.**`,
              '',
              'Run `npm run approve` locally to review them, then commit `data/tools.json` to publish.',
              '',
              ...lines,
            ].join('\n');

            const title = `🤖 ${pending.length} new AI tool(s) pending review`;

            // Ensure the label exists.
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: label,
                color: '6366f1',
                description: 'AI tools discovered by the pipeline, awaiting review',
              });
            }

            // Reuse an existing open issue if there is one.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.update({ ...context.repo, issue_number: number, title, body });
              core.info(`Updated issue #${number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: [label],
              });
              core.info(`Created issue #${created.data.number}.`);
            }
